<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>dBmeter — Real-time Noise Level Meter</title>
<meta name="description" content="A real-time noise level meter dashboard. Measure ambient sound in dB, visualize the waveform, track session statistics, and review weekly noise reports — all in the browser." />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="dBmeter - Real-time Noise Level Meter" />

<!-- Favicon: inline SVG with dB mark -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0a0a'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif' font-size='28' font-weight='800' letter-spacing='-1' fill='%2300E676'>dB</text></svg>" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface-1: #141414;
    --surface-2: #1a1a1a;
    --surface-3: #222222;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #00E676;
    --quiet: #00E676;
    --quiet-soft: #66BB6A;
    --moderate: #FF9100;
    --loud: #FF7043;
    --very-loud: #FF5252;
    --radius: 12px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: "tnum" on, "lnum" on;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ===== Dashboard grid ===== */
  .app {
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-rows: 60px 1fr 72px;
    grid-template-areas:
      "topbar"
      "main"
      "bottombar";
    gap: 12px;
    padding: 12px;
  }

  /* ===== Top bar ===== */
  .topbar {
    grid-area: topbar;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    justify-self: start;
  }
  .logo .accent { color: var(--accent); }

  .top-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-self: center;
  }

  .top-status {
    display: flex;
    align-items: center;
    gap: 18px;
    justify-self: end;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.2s ease;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.6);
    animation: pulse 1.6s infinite;
  }
  .status-dot.paused {
    background: #FF9100;
    box-shadow: 0 0 0 0 rgba(255, 145, 0, 0.6);
    animation: pulseAmber 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.6); }
    70%  { box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
  }
  @keyframes pulseAmber {
    0%   { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0.6); }
    70%  { box-shadow: 0 0 0 10px rgba(255, 145, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0); }
  }

  .timer {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    background: var(--surface-3);
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    letter-spacing: 0.02em;
  }

  /* ===== Buttons ===== */
  button {
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    height: 38px;
    padding: 0 18px;
    cursor: pointer;
    color: var(--text);
    background: var(--surface-2);
    transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease, filter 0.2s ease;
    letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.97); filter: brightness(0.95); }
  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-start {
    background: #00E676;
    color: #000;
    border-color: #00E676;
    min-width: 110px;
  }
  .btn-start:hover { background: #1aff8a; border-color: #1aff8a; }
  .btn-start.recording {
    background: var(--very-loud);
    color: #000;
    border-color: var(--very-loud);
  }
  .btn-start.recording:hover { background: #ff6b6b; border-color: #ff6b6b; }
  .btn-export { background: var(--surface-2); }
  .btn-export:hover { border-color: #3a3a3a; background: var(--surface-3); }

  .btn-pause {
    background: var(--surface-2);
    color: var(--text);
    display: none;
    min-width: 110px;
    gap: 8px;
  }
  .btn-pause.visible { display: inline-flex; }
  .btn-pause:hover { border-color: #3a3a3a; background: var(--surface-3); }
  .btn-pause.paused {
    color: #FF9100;
    border-color: #FF9100;
    background: rgba(255, 145, 0, 0.08);
  }
  .btn-pause.paused:hover {
    background: rgba(255, 145, 0, 0.16);
    border-color: #FFA733;
  }
  .btn-pause .icon {
    font-size: 11px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
  }

  /* ===== Main 3-column area ===== */
  .main {
    grid-area: main;
    display: grid;
    grid-template-columns: 30fr 40fr 30fr;
    gap: 12px;
    min-height: 0;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    min-width: 0;
  }

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
  }
  .card.flex-1 { flex: 1; }
  .card.flex-2 { flex: 2; }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .card-title .sub {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
  }

  /* ===== Left column: dB display + stats ===== */
  .db-card {
    flex: 1;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(180deg, var(--surface-1) 0%, var(--surface-2) 100%);
    padding: 28px 20px;
    overflow: hidden;
  }
  .db-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .db-number-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
  }
  .db-number {
    font-size: clamp(64px, 10vw, 140px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text-faint);
    transition: color 0.25s ease, text-shadow 0.25s ease;
  }
  .db-unit {
    font-size: clamp(20px, 2vw, 32px);
    font-weight: 600;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .db-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
  }
  .db-badge {
    display: inline-block;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface-3);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all 0.25s ease;
  }

  .stats-card { flex-shrink: 0; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .stat-unit {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    margin-left: 2px;
  }

  /* ===== Canvas wrappers (let canvas fill the card) ===== */
  .canvas-wrap {
    flex: 1;
    min-height: 0;
    min-width: 0;
    position: relative;
  }
  .canvas-wrap canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ===== Right column: weekly ===== */
  .weekly-summary {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 10px;
    flex-shrink: 0;
  }
  .weekly-avg-value {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .weekly-avg-unit {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .weekly-avg-caption {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
  }

  /* ===== Bottom bar: horizontal reference scale ===== */
  .bottombar {
    grid-area: bottombar;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }
  .bottombar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .ref-scale {
    position: relative;
    height: 30px;
  }
  .ref-track {
    position: absolute;
    left: 0;
    right: 0;
    top: 6px;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(
      90deg,
      #00E676 0%,
      #00E676 25%,
      #66BB6A 25%,
      #66BB6A 41.67%,
      #FF9100 41.67%,
      #FF9100 54.17%,
      #FF7043 54.17%,
      #FF7043 66.67%,
      #FF5252 66.67%,
      #FF5252 100%
    );
    opacity: 0.85;
  }
  .ref-marker {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  .ref-tick {
    width: 2px;
    height: 14px;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 1px;
  }
  .ref-text {
    margin-top: 2px;
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 500;
    text-align: center;
    line-height: 1.2;
  }
  .ref-text .db {
    color: var(--text);
    font-weight: 600;
    margin-left: 4px;
  }

  /* ===== Error ===== */
  .error-banner {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 82, 82, 0.12);
    border: 1px solid rgba(255, 82, 82, 0.4);
    color: #FF8A80;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    display: none;
    z-index: 100;
    backdrop-filter: blur(8px);
    max-width: 500px;
  }
  .error-banner.show { display: block; }

  /* ===== Responsive: collapse to scroll on smaller screens ===== */
  @media (max-width: 1100px) {
    html, body { overflow: auto; height: auto; }
    .app {
      height: auto;
      min-height: 100vh;
      grid-template-rows: 60px auto auto;
    }
    .main { grid-template-columns: 1fr; }
    .col { min-height: auto; }
    .db-card { padding: 40px 20px; }
    .canvas-wrap { height: 200px; }
  }
</style>
</head>
<body>
  <div class="error-banner" id="errorBanner"></div>

  <div class="app">

    <!-- ===== Top bar ===== -->
    <header class="topbar">
      <div class="logo"><span class="accent">dB</span>meter</div>

      <div class="top-controls">
        <button class="btn-start" id="btnStart">Start</button>
        <button class="btn-pause" id="btnPause" aria-label="Pause recording">
          <span class="icon" id="btnPauseIcon">❚❚</span>
          <span id="btnPauseLabel">Pause</span>
        </button>
        <button class="btn-export" id="btnExport">Export CSV</button>
      </div>

      <div class="top-status">
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Idle</span>
        </div>
        <div class="timer" id="sessionTime">00:00</div>
      </div>
    </header>

    <!-- ===== Main 3-column area ===== -->
    <main class="main">

      <!-- Left column: dB + stats -->
      <div class="col">
        <div class="card db-card">
          <div class="db-display">
            <div class="db-number-wrap">
              <span class="db-number" id="dbNumber">—</span><span class="db-unit">dB</span>
            </div>
            <div class="db-label">Sound level</div>
            <div class="db-badge" id="dbBadge">Press start</div>
          </div>
        </div>
        <div class="card stats-card">
          <div class="card-title"><span>Session stats</span></div>
          <div class="stats">
            <div class="stat">
              <div class="stat-label">Current</div>
              <div class="stat-value"><span id="statCurrent">—</span><span class="stat-unit">dB</span></div>
            </div>
            <div class="stat">
              <div class="stat-label">Average</div>
              <div class="stat-value"><span id="statAvg">—</span><span class="stat-unit">dB</span></div>
            </div>
            <div class="stat">
              <div class="stat-label">Peak</div>
              <div class="stat-value"><span id="statPeak">—</span><span class="stat-unit">dB</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Center column: waveform + history -->
      <div class="col">
        <div class="card flex-1">
          <div class="card-title"><span>Live waveform</span></div>
          <div class="canvas-wrap"><canvas id="waveform"></canvas></div>
        </div>
        <div class="card flex-1">
          <div class="card-title"><span>Session history</span><span class="sub" id="historySub">— samples</span></div>
          <div class="canvas-wrap"><canvas id="historyChart"></canvas></div>
        </div>
      </div>

      <!-- Right column: weekly -->
      <div class="col">
        <div class="card" style="flex:1;">
          <div class="card-title">
            <span>Weekly report</span>
            <span class="sub" id="weeklyRange">—</span>
          </div>
          <div class="canvas-wrap"><canvas id="weeklyChart"></canvas></div>
          <div class="weekly-summary">
            <span class="weekly-avg-value" id="weeklyAvg">—</span>
            <span class="weekly-avg-unit">dB</span>
            <span class="weekly-avg-caption">7-day average</span>
          </div>
        </div>
      </div>

    </main>

    <!-- ===== Bottom bar: reference scale ===== -->
    <footer class="bottombar">
      <div class="bottombar-header">
        <span>Reference noise scale</span>
        <span style="text-transform:none; letter-spacing:0; font-weight:500; color:var(--text-faint);">0 — 120 dB</span>
      </div>
      <div class="ref-scale" id="refScale"></div>
    </footer>

  </div>

<script>
(() => {
  'use strict';

  // ---------- Constants ----------
  const DB_MIN = 0;
  const DB_MAX = 120;
  const MAX_HISTORY = 300;
  const STORAGE_KEY = 'dbmeter_weekly';
  const DAY_LABELS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  const REFERENCES = [
    { label: 'Breathing', db: 10 },
    { label: 'Whisper', db: 30 },
    { label: 'Conversation', db: 60 },
    { label: 'Busy traffic', db: 80 },
    { label: 'Motorcycle', db: 95 },
    { label: 'Rock concert', db: 110 },
  ];

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const dbNumberEl = $('dbNumber');
  const dbBadgeEl = $('dbBadge');
  const statusDotEl = $('statusDot');
  const statusTextEl = $('statusText');
  const errorBannerEl = $('errorBanner');
  const statCurrentEl = $('statCurrent');
  const statAvgEl = $('statAvg');
  const statPeakEl = $('statPeak');
  const sessionTimeEl = $('sessionTime');
  const historySubEl = $('historySub');
  const weeklyAvgEl = $('weeklyAvg');
  const weeklyRangeEl = $('weeklyRange');
  const btnStart = $('btnStart');
  const btnPause = $('btnPause');
  const btnPauseIcon = $('btnPauseIcon');
  const btnPauseLabel = $('btnPauseLabel');
  const btnExport = $('btnExport');
  const waveCanvas = $('waveform');
  const historyCanvas = $('historyChart');
  const weeklyCanvas = $('weeklyChart');
  const refScale = $('refScale');

  // ---------- State ----------
  let audioCtx = null;
  let analyser = null;
  let mediaStream = null;
  let sourceNode = null;
  let timeData = null;
  let rafId = null;

  let isRunning = false;
  let isPaused = false;
  let sessionStart = 0;
  let pausedAt = 0;
  let pausedTotal = 0;
  let sessionSamples = 0;
  let sessionSum = 0;
  let sessionPeak = 0;
  let currentDb = 0;
  let history = [];

  // ---------- Helpers ----------
  function classifyDb(db) {
    if (db < 30) return { color: '#00E676', name: 'Very quiet' };
    if (db < 50) return { color: '#66BB6A', name: 'Quiet' };
    if (db < 65) return { color: '#FF9100', name: 'Moderate' };
    if (db < 80) return { color: '#FF7043', name: 'Loud' };
    return { color: '#FF5252', name: 'Very loud' };
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
  }

  function isoDate(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function setupCanvas(canvas) {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    const w = Math.max(1, Math.floor(rect.width * dpr));
    const h = Math.max(1, Math.floor(rect.height * dpr));
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w: rect.width, h: rect.height };
  }

  function hexToRgba(hex, a) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ---------- Weekly storage ----------
  function loadWeekly() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (_e) { return {}; }
  }

  function saveWeekly(obj) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch (_e) {}
  }

  function getLast7Days() {
    const days = [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      days.push(d);
    }
    return days;
  }

  function saveSessionToWeekly() {
    if (sessionSamples === 0) return;
    const avg = sessionSum / sessionSamples;
    const data = loadWeekly();
    const todayKey = isoDate(new Date());
    const existing = data[todayKey];
    if (existing && typeof existing.sum === 'number' && typeof existing.count === 'number') {
      existing.sum += avg;
      existing.count += 1;
      existing.avg = existing.sum / existing.count;
      existing.peak = Math.max(existing.peak || 0, sessionPeak);
    } else {
      data[todayKey] = { sum: avg, count: 1, avg: avg, peak: sessionPeak };
    }
    saveWeekly(data);
  }

  // ---------- Rendering: waveform ----------
  function drawWaveform() {
    const { ctx, w, h } = setupCanvas(waveCanvas);
    ctx.clearRect(0, 0, w, h);

    if (!analyser || !timeData) {
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
      return;
    }

    analyser.getByteTimeDomainData(timeData);
    const color = classifyDb(currentDb).color;
    const N = timeData.length;
    const step = w / N;

    // baseline
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    ctx.lineWidth = 2;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const v = (timeData[i] - 128) / 128;
      const x = i * step;
      const y = (h / 2) + v * (h / 2) * 0.9;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ---------- Rendering: history line chart ----------
  function drawHistory() {
    const { ctx, w, h } = setupCanvas(historyCanvas);
    ctx.clearRect(0, 0, w, h);

    const padL = 30, padR = 8, padT = 10, padB = 14;
    const innerW = w - padL - padR;
    const innerH = h - padT - padB;

    // Grid lines
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#555';
    ctx.font = '10px Pretendard Variable, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    [30, 60, 90].forEach((g) => {
      const y = padT + innerH * (1 - g / DB_MAX);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(w - padR, y);
      ctx.stroke();
      ctx.fillText(String(g), padL - 6, y);
    });

    ctx.strokeStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(padL, padT);
    ctx.lineTo(w - padR, padT);
    ctx.moveTo(padL, padT + innerH);
    ctx.lineTo(w - padR, padT + innerH);
    ctx.stroke();

    if (history.length < 2) return;

    const color = classifyDb(currentDb).color;
    const N = history.length;
    const dx = innerW / (MAX_HISTORY - 1);
    const offset = MAX_HISTORY - N;

    const xy = (i, v) => {
      const x = padL + (offset + i) * dx;
      const y = padT + innerH * (1 - clamp(v, 0, DB_MAX) / DB_MAX);
      return [x, y];
    };

    // fill
    ctx.beginPath();
    const [x0, y0] = xy(0, history[0]);
    ctx.moveTo(x0, padT + innerH);
    ctx.lineTo(x0, y0);
    for (let i = 1; i < N; i++) {
      const [x, y] = xy(i, history[i]);
      ctx.lineTo(x, y);
    }
    const [xL] = xy(N - 1, history[N - 1]);
    ctx.lineTo(xL, padT + innerH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padT, 0, padT + innerH);
    grad.addColorStop(0, hexToRgba(color, 0.32));
    grad.addColorStop(1, hexToRgba(color, 0.02));
    ctx.fillStyle = grad;
    ctx.fill();

    // line
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const [x, y] = xy(i, history[i]);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.8;
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ---------- Rendering: weekly bar chart ----------
  function drawWeekly() {
    const { ctx, w, h } = setupCanvas(weeklyCanvas);
    ctx.clearRect(0, 0, w, h);

    const data = loadWeekly();
    const days = getLast7Days();
    const values = days.map((d) => {
      const key = isoDate(d);
      const entry = data[key];
      return entry && typeof entry.avg === 'number' ? entry.avg : 0;
    });

    const padL = 18, padR = 10, padT = 22, padB = 26;
    const innerW = w - padL - padR;
    const innerH = h - padT - padB;
    const slot = innerW / 7;
    const barW = Math.min(slot * 0.62, 40);

    // baseline
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, padT + innerH);
    ctx.lineTo(w - padR, padT + innerH);
    ctx.stroke();

    ctx.font = '11px Pretendard Variable, sans-serif';

    for (let i = 0; i < 7; i++) {
      const v = values[i];
      const cx = padL + slot * i + slot / 2;
      const bh = innerH * (clamp(v, 0, DB_MAX) / DB_MAX);
      const x = cx - barW / 2;
      const y = padT + innerH - bh;

      const color = v > 0 ? classifyDb(v).color : '#2a2a2a';
      ctx.fillStyle = v > 0 ? color : '#1f1f1f';
      roundRect(ctx, x, y, barW, Math.max(bh, 3), 4);
      ctx.fill();

      if (v > 0) {
        ctx.fillStyle = '#ddd';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(Math.round(v) + '', cx, y - 4);
      }

      const d = days[i];
      const isToday = isoDate(d) === isoDate(new Date());
      ctx.fillStyle = isToday ? '#fff' : '#888';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(DAY_LABELS[d.getDay()], cx, padT + innerH + 8);
    }

    const used = values.filter((v) => v > 0);
    const wAvg = used.length ? used.reduce((a, b) => a + b, 0) / used.length : NaN;
    weeklyAvgEl.textContent = isFinite(wAvg) ? Math.round(wAvg) : '—';
    weeklyRangeEl.textContent = `${isoDate(days[0])} — ${isoDate(days[6])}`;
  }

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    ctx.lineTo(x + rr, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
    ctx.lineTo(x, y + rr);
    ctx.quadraticCurveTo(x, y, x + rr, y);
    ctx.closePath();
  }

  // ---------- Reference scale (horizontal) ----------
  function buildReferenceScale() {
    refScale.innerHTML = '';
    REFERENCES.forEach((r) => {
      const marker = document.createElement('div');
      marker.className = 'ref-marker';
      marker.style.left = (r.db / DB_MAX * 100).toFixed(2) + '%';
      marker.innerHTML = `
        <div class="ref-tick"></div>
        <div class="ref-text">${r.label}<span class="db">${r.db}dB</span></div>
      `;
      refScale.appendChild(marker);
    });
  }

  // ---------- Audio ----------
  async function start() {
    if (isRunning) return;
    hideError();
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      });
    } catch (err) {
      showError(err && err.name === 'NotAllowedError'
        ? 'Microphone permission denied. Please allow microphone access in your browser settings.'
        : 'Could not access microphone: ' + (err && err.message ? err.message : err));
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.6;
    sourceNode.connect(analyser);

    timeData = new Uint8Array(analyser.fftSize);

    isRunning = true;
    isPaused = false;
    sessionStart = performance.now();
    pausedAt = 0;
    pausedTotal = 0;
    sessionSamples = 0;
    sessionSum = 0;
    sessionPeak = 0;
    history = [];

    btnStart.textContent = 'Stop';
    btnStart.classList.add('recording');
    statusDotEl.classList.add('active');
    statusDotEl.classList.remove('paused');
    statusTextEl.textContent = 'Recording';
    btnPause.classList.add('visible');
    btnPause.classList.remove('paused');
    btnPauseLabel.textContent = 'Pause';
    btnPauseIcon.textContent = '❚❚';
    btnPause.setAttribute('aria-label', 'Pause recording');

    loop();
  }

  function togglePause() {
    if (!isRunning) return;
    if (!isPaused) {
      isPaused = true;
      pausedAt = performance.now();
      btnPause.classList.add('paused');
      btnPauseLabel.textContent = 'Resume';
      btnPauseIcon.textContent = '▶';
      btnPause.setAttribute('aria-label', 'Resume recording');
      statusDotEl.classList.remove('active');
      statusDotEl.classList.add('paused');
      statusTextEl.textContent = 'Paused';
    } else {
      isPaused = false;
      pausedTotal += performance.now() - pausedAt;
      pausedAt = 0;
      btnPause.classList.remove('paused');
      btnPauseLabel.textContent = 'Pause';
      btnPauseIcon.textContent = '❚❚';
      btnPause.setAttribute('aria-label', 'Pause recording');
      statusDotEl.classList.add('active');
      statusDotEl.classList.remove('paused');
      statusTextEl.textContent = 'Recording';
    }
  }

  function stop() {
    if (!isRunning) return;
    isRunning = false;
    isPaused = false;
    pausedAt = 0;
    pausedTotal = 0;

    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;

    saveSessionToWeekly();

    if (sourceNode) { try { sourceNode.disconnect(); } catch (_e) {} sourceNode = null; }
    if (analyser) { try { analyser.disconnect(); } catch (_e) {} analyser = null; }
    if (mediaStream) {
      mediaStream.getTracks().forEach((t) => t.stop());
      mediaStream = null;
    }
    if (audioCtx) {
      audioCtx.close().catch(() => {});
      audioCtx = null;
    }
    timeData = null;

    btnStart.textContent = 'Start';
    btnStart.classList.remove('recording');
    statusDotEl.classList.remove('active');
    statusDotEl.classList.remove('paused');
    statusTextEl.textContent = 'Idle';
    btnPause.classList.remove('visible');
    btnPause.classList.remove('paused');
    btnPauseLabel.textContent = 'Pause';
    btnPauseIcon.textContent = '❚❚';
    btnPause.setAttribute('aria-label', 'Pause recording');

    drawAll();
  }

  function computeDb() {
    analyser.getByteTimeDomainData(timeData);
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
      const x = (timeData[i] - 128) / 128;
      sum += x * x;
    }
    const rms = Math.sqrt(sum / timeData.length);
    let db = rms > 0 ? 20 * Math.log10(rms) + 100 : 0;
    return clamp(db, DB_MIN, DB_MAX);
  }

  let lastUiUpdate = 0;
  function loop() {
    if (!isRunning) return;
    rafId = requestAnimationFrame(loop);

    if (isPaused) return; // freeze: skip sampling, history, UI updates, and redraws

    const db = computeDb();
    currentDb = db;

    sessionSamples += 1;
    sessionSum += db;
    if (db > sessionPeak) sessionPeak = db;

    if (history.length >= MAX_HISTORY) history.shift();
    history.push(db);

    const now = performance.now();
    if (now - lastUiUpdate > 80) {
      lastUiUpdate = now;
      const cls = classifyDb(db);

      dbNumberEl.textContent = Math.round(db);
      dbNumberEl.style.color = cls.color;
      dbNumberEl.style.textShadow = `0 0 32px ${hexToRgba(cls.color, 0.3)}`;
      dbBadgeEl.textContent = cls.name;
      dbBadgeEl.style.color = cls.color;
      dbBadgeEl.style.borderColor = hexToRgba(cls.color, 0.4);
      dbBadgeEl.style.background = hexToRgba(cls.color, 0.08);

      statCurrentEl.textContent = Math.round(db);
      statAvgEl.textContent = Math.round(sessionSum / sessionSamples);
      statPeakEl.textContent = Math.round(sessionPeak);
      sessionTimeEl.textContent = fmtTime(now - sessionStart - pausedTotal);
      historySubEl.textContent = `${history.length} / ${MAX_HISTORY} samples`;
    }

    drawWaveform();
    drawHistory();
  }

  // ---------- Export ----------
  function exportCsv() {
    const data = loadWeekly();
    const days = getLast7Days();
    const rows = [['date', 'day', 'average_db', 'peak_db', 'sessions']];
    days.forEach((d) => {
      const key = isoDate(d);
      const e = data[key];
      rows.push([
        key,
        DAY_LABELS[d.getDay()],
        e && isFinite(e.avg) ? e.avg.toFixed(2) : '',
        e && isFinite(e.peak) ? e.peak.toFixed(2) : '',
        e && isFinite(e.count) ? e.count : 0,
      ]);
    });
    const csv = rows.map((r) => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dbmeter-weekly-${isoDate(new Date())}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function showError(msg) {
    errorBannerEl.textContent = msg;
    errorBannerEl.classList.add('show');
  }
  function hideError() {
    errorBannerEl.classList.remove('show');
    errorBannerEl.textContent = '';
  }

  function drawAll() {
    drawWaveform();
    drawHistory();
    drawWeekly();
  }

  // ---------- Wiring ----------
  btnStart.addEventListener('click', () => {
    if (isRunning) stop();
    else start();
  });
  btnPause.addEventListener('click', togglePause);
  btnExport.addEventListener('click', exportCsv);

  // ResizeObserver for canvases — redraw immediately when their container resizes
  const ro = new ResizeObserver(() => {
    drawAll();
  });
  ro.observe(waveCanvas.parentElement);
  ro.observe(historyCanvas.parentElement);
  ro.observe(weeklyCanvas.parentElement);

  window.addEventListener('resize', drawAll);

  window.addEventListener('beforeunload', () => {
    if (isRunning) {
      saveSessionToWeekly();
      if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
      if (audioCtx) audioCtx.close().catch(() => {});
    }
  });

  // Init
  buildReferenceScale();
  drawAll();
})();
</script>
</body>
</html>
